apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: postgres

resources:
- 01-namespace.yaml
- 02-postgres-pvc.yaml
- 21-postgres-statefulset.yaml
- 22-postgres-service.yaml
- 31-pgadmin-deployment.yaml
- 32-pgadmin-service.yaml
- 50-init-job.yaml

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: postgres-secret
    envs:
      - .env.postgres.secret

