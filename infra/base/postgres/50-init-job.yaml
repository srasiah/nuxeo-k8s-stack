apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-init-job
  namespace: postgres
spec:
  template:
    metadata:
      labels:
        app: postgres-init
    spec:
      restartPolicy: OnFailure
      containers:
      - name: postgres-init
        image: postgres:17-alpine
        env:
        - name: PGHOST
          value: postgres-service
        - name: PGPORT
          value: "5432"
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-username
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-password
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for PostgreSQL to be ready..."
          until pg_isready -h $PGHOST -p $PGPORT -U $PGUSER; do
            echo "PostgreSQL is unavailable - sleeping"
            sleep 2
          done
          
          echo "PostgreSQL is ready, creating databases..."
          
          # Create GitLab database if it doesn't exist
          psql -tc "SELECT 1 FROM pg_database WHERE datname = 'gitlab'" | grep -q 1 || \
            psql -c "CREATE DATABASE gitlab OWNER $PGUSER;"
          
          echo "Database initialization complete!"
          
          # List all databases
          psql -c "\l"
