apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cert-manager

resources:
#- 01-namespace.yaml
- https://github.com/cert-manager/cert-manager/releases/download/v1.14.4/cert-manager.yaml
- 05-selfsigned-issuer.yaml
 # cert-manager is already installed via Helm or kubectl, just apply our custom issuers

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: cloudflare-api-token-secret
    envs:
      - .env.cloudflare.secret

