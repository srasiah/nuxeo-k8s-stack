apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-init
  labels:
    app: minio-init
spec:
  ttlSecondsAfterFinished: 300  # Clean up after 5 minutes
  template:
    metadata:
      labels:
        app: minio-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-mc
          image: quay.io/minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for MinIO to be ready..."
              until mc alias set myminio http://minio-service.minio.svc.cluster.local:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD; do
                echo "MinIO not ready yet, retrying in 5s..."
                sleep 5
              done
              
              echo "MinIO is ready. Creating bucket..."
              mc mb myminio/nuxeo-blob-storage --ignore-existing
              
              echo "Setting bucket policy to allow read/write..."
              mc anonymous set download myminio/nuxeo-blob-storage
              
              echo "Bucket 'nuxeo-blob-storage' created successfully!"
              mc ls myminio/
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: minio-accesskey
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: minio-secretkey
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
