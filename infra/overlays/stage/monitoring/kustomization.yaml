apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources:
- ../../../base/monitoring
- ingress.yaml

patches:
- path: coredns-dashboard-patch.yaml

configMapGenerator:
  - name: monitoring-config
    envs:
      - .env.monitoring

replacements:
  - source:
      kind: ConfigMap
      name: monitoring-config
      fieldPath: data.GRAFANA_HOST
    targets:
      - select:
          kind: Ingress
          name: monitoring-ingress
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0
  - source:
      kind: ConfigMap
      name: monitoring-config
      fieldPath: data.PROMETHEUS_HOST
    targets:
      - select:
          kind: Ingress
          name: monitoring-ingress
        fieldPaths:
          - spec.rules.1.host
          - spec.tls.0.hosts.1
  - source:
      kind: ConfigMap
      name: monitoring-config
      fieldPath: data.CLUSTER_ISSUER
    targets:
      - select:
          kind: Ingress
          name: monitoring-ingress
        fieldPaths:
          - metadata.annotations.cert-manager\.io/cluster-issuer


