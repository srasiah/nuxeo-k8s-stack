# infra/overlays/dev/kafka/kafka-patch.yaml
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kafka
  namespace: kafka
spec:
  kafka:
    config:
      controller.quorum.voters: "0@kafka-kafka-0.kafka-kafka-brokers.kafka.svc:9093,1@kafka-kafka-1.kafka-kafka-brokers.kafka.svc:9093,2@kafka-kafka-2.kafka-kafka-brokers.kafka.svc:9093"
      default.replication.factor: 1
      min.insync.replicas: 1
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1