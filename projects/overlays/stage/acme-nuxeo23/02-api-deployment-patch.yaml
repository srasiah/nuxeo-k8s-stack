apiVersion: apps/v1
kind: Deployment
metadata:
  name: nuxeo-api-deployment
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: nuxeo-api     
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
            limits:
              cpu: "8"
              memory: "24Gi"
