#nuxeo/41-nuxeo-api-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nuxeo-api-deployment
  labels:
    app: nuxeo-api
    appGroup: nuxeo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nuxeo-api
  template:
    metadata:
      labels:
        app: nuxeo-api
        appRole: api
        appGroup: nuxeo
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      terminationGracePeriodSeconds: 60
      restartPolicy: Always
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values: ["nuxeo-api"]
              topologyKey: kubernetes.io/hostname
      #serviceAccountName: cluster-wide-reader-sa  # Inherits the pull secret 
      #automountServiceAccountToken: true
      imagePullSecrets:
        - name: try-cred
      containers:
        - name: nuxeo-api
          image: docker-private.packages.nuxeo.com/nuxeo/nuxeo
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8787
              name: debug
            - containerPort: 1089
              name: jmx
          env:
            - name: NUXEO_CLID
              valueFrom:
                secretKeyRef:
                  name: nuxeo-secret
                  key: clid
            - name: NUXEO_CLUSTER_NODEID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MONGODB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: nuxeo-secret
                  key: mongodb-username
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nuxeo-secret
                  key: mongodb-password     
            - name: ELASTICSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: nuxeo-secret
                  key: elastic-username
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nuxeo-secret
                  key: elastic-password                                      
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: nuxeo-secret
                  key: aws-accesskey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: nuxeo-secret
                  key: aws-secretkey
          envFrom:
            - configMapRef:
                name: nuxeo-common-config
            - configMapRef:
                name: nuxeo-api-config
          startupProbe:
            httpGet:
              path:  /nuxeo/runningstatus
              port: 8080
            initialDelaySeconds: 60   
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 18    
          # Readiness probe: pod is ready only when Nuxeo runtime responds
          readinessProbe:
            httpGet:
              path: /nuxeo/runningstatus
              port: 8080
            initialDelaySeconds: 30   # wait 30s before first probe
            timeoutSeconds: 10
            periodSeconds: 10
          # Liveness probe: shorter initial delay
          livenessProbe:
            httpGet:
              path: /nuxeo/runningstatus
              port: 8080
            initialDelaySeconds: 120  # 2 min delay
            timeoutSeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: nuxeo-data-volume
              mountPath: /var/lib/nuxeo
            - name: nuxeo-stream-volume
              mountPath: /opt/nuxeo/server/stream
            - name: nuxeo-tmp-volume
              mountPath: /tmp
            - name: nuxeo-logs-volume
              mountPath: /var/log/nuxeo
            - name: nuxeo-import-volume
              mountPath: /opt/nuxeo/server/import
            - name: nuxeo-config-00-core
              mountPath: /etc/nuxeo/conf.d/00-core.conf
              subPath: 00-core.conf  
            - name: nuxeo-config-00-system
              mountPath: /etc/nuxeo/conf.d/00-system.conf
              subPath: 00-system.conf
            - name: nuxeo-config-00-mail
              mountPath: /etc/nuxeo/conf.d/00-mail.conf
              subPath: 00-mail.conf
            - name: nuxeo-config-log4j2
              mountPath: /opt/nuxeo/server/lib/log4j2.xml
              subPath: log4j2.xml
            - name: nuxeo-init-startup-script
              mountPath: /docker-entrypoint-initnuxeo.d/nuxeo-startup.sh
              subPath: nuxeo-startup.sh
              readOnly: true
            - name: gcp-credentials-volume
              mountPath: /opt/nuxeo/gcpvision
              readOnly: true
      volumes:              
        - name: nuxeo-data-volume
          emptyDir: {}
        - name: nuxeo-stream-volume
          emptyDir: {}
        - name: nuxeo-tmp-volume
          emptyDir: {}
        - name: nuxeo-logs-volume
          emptyDir: {}
        - name: nuxeo-import-volume
          emptyDir: {}
        - name: nuxeo-config-00-core
          configMap:
            name: nuxeo-config-00-core          
        - name: nuxeo-config-00-system
          configMap:
            name: nuxeo-config-00-system
        - name: nuxeo-config-00-mail
          configMap:
            name: nuxeo-config-00-mail
        - name: nuxeo-config-log4j2
          configMap:
            name: nuxeo-config-log4j2        
        - name: nuxeo-init-startup-script
          configMap:
            name: nuxeo-init-startup-script
            defaultMode: 0755
        - name: gcp-credentials-volume
          secret:
            secretName: gcp-credentials
            optional: true
            items:
            - key: gcp-key
              path: gcp-credentials.json
